<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENT NOW</title>
  <link rel="stylesheet" href="uzbek.css">
  <link rel="icon" type="image/png" href="images/bugati.png">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">RENTAL</div>
    <nav class="nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Cars</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Reviews</a></li>
      </ul>
    </nav>
    <a href="#" class="get-started-btn">Get Started</a>
  </header>
<br><br><br>
<div class="header">
    <h1>Get in Touch for Your Dream Ride! <span>✨</span></h1>
    <p>
        Have questions or need help? Our team is here to<br>help you find
        the perfect car for your adventure.
    </p>
</div>
  <!-- Main Section -->
  <main class="main-content">
    <div class="left-decoration"></div>
    <form class="form">      
      <!-- First Row -->
      <div class="row gray-section">
        <div class="form-group">
          <label for="location">Location:</label>
          <select id="location" name="location">
            <option value="location" disabled selected>Enter your location</option>
            <option value="los-angeles">Los Angeles</option>
            <option value="new-york">New York</option>
            <option value="chicago">Atlanta</option>
            <option value="chicago">Tashkent</option>
            <option value="chicago">Almaty</option>
            <option value="chicago">Jizzax</option>
            <option value="chicago">London</option>
            <option value="chicago">Moscow</option>
            <option value="chicago">Washington</option>
            <option value="chicago">Farg'ona</option>
            <option value="chicago">Quddus</option>
            <option value="chicago">Guliston</option>
            <option value="chicago">O'sh</option>
          </select>
        </div>
        <div class="form-group">
          <label for="car">Car to rent:</label>
          <select id="car" name="car">
            <option value="mercedes" disabled selected>Enter car name</option>
            <option value="mercedes">Ko'k Jiguli</option>
            <option value="bmw">BMW M5</option>
            <option value="audi">Audi R8</option>
            <option value="audi">Rolls-Royce Boat Tail</option>
            <option value="audi">Bugatti La Voiture</option>
            <option value="audi">Lamborghini Veneno</option>
            <option value="audi">Mercedes-AMG One</option>
            <option value="audi">Malibu</option>
            <option value="audi">Captiva</option>
            <option value="audi">Gentra</option>
            <option value="audi">Cobalt</option>
            <option value="audi">Chevrolet Comaro</option>
            <option value="audi">Tesla</option>
            <option value="audi">Mercedes-AMG GT R</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date:</label>
          <input type="date" id="date" name="date">
        </div>
      </div>
      <br><br>

      <!-- Second Row -->
      <div class="form-group-input">
        <label for="name"></label>
        <input type="text" id="name" name="name" placeholder="Name">
      </div>
      <div class="form-group-input">
        <label for="email"></label>
        <input type="email" id="email" name="email" placeholder="Email">
      </div>
      <div class="form-group-input">
        <label for="phone"></label>
        <input type="tel" id="phone" name="phone" placeholder="Phone">
      </div><br>
      <button type="button" class="btn">Submit</button>
    </form>
    <div class="right-decoration"></div>
  </main>
</body>
</html>
